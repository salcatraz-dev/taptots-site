<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#16361a">
<title>Memory Match Safari | TapTots</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;background:
radial-gradient(circle at 20% 20%, rgba(52, 112, 49, .18), transparent 35%),
linear-gradient(90deg,#0d2b11 0%,#123e18 22%,#123e18 78%,#0d2b11 100%);
color:#f7f1df;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:24px}
.brand{display:flex;align-items:center;gap:14px;color:#ffd84d;text-decoration:none;font-family:Fredoka,sans-serif;font-size:40px;font-weight:700;justify-content:center;margin:8px 0 26px}
.logo{width:80px;height:80px;border-radius:24px;background:#f6d64a;display:grid;place-items:center;
box-shadow:0 6px 0 rgba(0,0,0,.18), inset 0 -6px 0 rgba(0,0,0,.08);font-size:40px}
.card{background:#114d1a;border:1px solid rgba(255,255,255,.08);border-radius:34px;padding:32px;box-shadow:0 12px 50px rgba(0,0,0,.22)}
.pill{display:inline-block;background:#8ed0f8;color:#18334d;font-weight:800;border-radius:999px;padding:10px 18px;margin-bottom:18px}
.panel{background:#f6efdf;color:#352919;border-radius:28px;padding:28px}
h1{font-family:Fredoka,sans-serif;font-size:clamp(40px,8vw,72px);line-height:.98;margin:0 0 14px}
p{font-size:clamp(18px,2.5vw,28px);line-height:1.5;color:#594d3a}
.btns{display:flex;gap:14px;flex-wrap:wrap;margin-top:22px}
.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:18px;padding:16px 22px;font-weight:800;font-size:20px}
.btn-primary{background:#f1cf42;color:#1d1705;box-shadow:0 5px 0 rgba(0,0,0,.2)}
.btn-secondary{background:#2f6d35;color:#f6efdf;border:1px solid rgba(255,255,255,.15)}
.note{margin-top:18px;color:#d8cfb8;font-size:16px}
</style>
</head>
<body>
  <div class="wrap">
    <a class="brand" href="/index.html"><div class="logo">🎨</div><div>TapTots</div></a>
    <div class="card">
      <div class="pill">NEW GAME COMING SOON</div>
      <div class="panel">
        <h1>Memory Match Safari</h1>
        <p>A safari matching game is on the roadmap. For now, this page prevents dead links and keeps the TapTots experience smooth.</p>
        <div class="btns">
          <a class="btn btn-primary" href="/abc-tappers.html">Play ABC Tappers now</a>
          <a class="btn btn-secondary" href="/play.html">Back to game hub</a>
        </div>
        <div class="note">This page is here so your site links work while the full game is being built.</div>
      </div>
    </div>
  </div>
  <script src="/auth.js"></script>
</body>
</html>
